                            <a href="#">

                                    fill="none">
                                    <path d="M2 12.2354H41" stroke="currentcolor" stroke-width="2"
                                        stroke-linecap="round" />
                                    <path d="M2 22.1177H41" stroke="currentcolor" stroke-width="2"
                                        stroke-linecap="round" />

                        </li>
                        <li class="header__burger-close">
                            <a href="#">
                                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="16" viewBox="0 0 34 34"
                                    fill="none">
                                    <path d="M1 1.29297L33.707 34" stroke="currentcolor" stroke-width="2"
                                        stroke-linecap="round" />
                                    <path d="M1 34L33.707 1.29297" stroke="currentcolor" stroke-width="2"
                                        stroke-linecap="round" />
                                </svg></a>
                        </li>
                        <li class="header__button">
                            <a href="https://portal.platforma-czs.ru/registration/">Регистрация</a>
                        </li>
                        <li class="header__button">
                            <a href="https://portal.platforma-czs.ru/login/">Вход</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
        <nav class="header__menu">           
        </nav>
    </header>

    <main class="login-wrapper login_page">
        <div class="container">
            <section class="title__block">
                <h1 class="title">Вход</h1>                
            </section>

            <div class="login_page_grid">
                <!-- <div class="section_title">Вход в кабинет</div> -->
                <div class="login_form">
                    <div class="data_field">
                        <div class="input_field">
                            <input type="hidden" class="return_url" value="">
                            <div class="login_by_way" for="by_login_pass">
                                <div class="email"><input type="text" placeholder="Эл. почта"></div>
                                <div class="password"><input type="password" placeholder="Пароль"></div>
                                <div class="action">
                                    <button class="login_button">Войти</button>
                                </div>
                                <div class="restore">
                                    <a class="restore_pass" href="#">Забыли пароль?</a>
                                </div>
                            </div>

                            <div class="login_by_way" for="by_phone" style="display:none;">
                                <div class="phone"><input type="text" placeholder="Номер телефона"></div>
                                <div class="send_btn" style="display:none;"><button class="check_phone">Отправить
                                        код</button></div>
                                <div class="answer"></div>
                            </div>


                        </div>
                    </div>
                </div>
                <div class="confedential"><a href="https://platforma-czs.ru/conf">Политика конфиденциальности</a></div>
            </div>

        </div>
    </main>
